# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/transitops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# ddl-auto=update → Hibernate creates/alters the `users` table automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Replace with a 32+ char random secret before deploying to production
jwt.secret=CHANGE_ME_USE_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS
jwt.expiration-ms=86400000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.transitops=DEBUG
logging.level.org.springframework.security=INFO
