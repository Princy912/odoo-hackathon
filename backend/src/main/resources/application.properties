# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/transitops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Replace with a strong, randomly-generated base64 secret before production
jwt.secret=CHANGE_ME_USE_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS
jwt.expiration-ms=86400000

# ─── Spring Security ──────────────────────────────────────────────────────────
# Default user disabled in favour of JWT — remove in prod
spring.security.user.name=admin
spring.security.user.password=admin

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.transitops=DEBUG
logging.level.org.springframework.security=INFO
